worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # NOTE: This server listens on plain HTTP. For deployments outside
    # localhost/Docker internal networking, terminate TLS at an upstream
    # reverse proxy (e.g. Cloudflare, AWS ALB, Caddy) before forwarding
    # to port 8080. Do not expose this port directly to the internet.
    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        # CSP: cdn.jsdelivr.net is required for Three.js (index.html importmap) and
        # MediaPipe vision (js/tracker.js). storage.googleapis.com is required for
        # MediaPipe model weights (js/tracker.js). Both are pre-existing game
        # dependencies from the main branch. /api/scores uses relative path
        # restricted to 'self'.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://cdn.jsdelivr.net https://storage.googleapis.com; img-src 'self' data: blob:; media-src 'self' blob:; frame-ancestors 'self';" always;

        location /api/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Defense-in-depth: cap request body at 2KB at the proxy layer.
            # The Node API also enforces its own 1KB body limit (MAX_BODY).
            client_max_body_size 2k;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Serve .mjs files with correct MIME type
        location ~* \.mjs$ {
            types { application/javascript mjs; }
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|gif|ico|svg)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }
}
