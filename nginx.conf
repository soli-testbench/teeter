worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # CSP: sha256 hash allowlists the inline importmap in index.html.
        # connect-src: cdn.jsdelivr.net and storage.googleapis.com are required
        # by js/tracker.js for MediaPipe vision bundle, WASM, and model fetches.
        add_header Content-Security-Policy "script-src 'self' https://cdn.jsdelivr.net 'sha256-Cb7VRvgKHYvwTusy6WvuTr1ww8fUTjYTnEACYzG5a/8='; style-src 'self' 'unsafe-inline'; default-src 'self'; connect-src 'self' https://cdn.jsdelivr.net https://storage.googleapis.com; img-src 'self' data:; font-src 'self';" always;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Serve .mjs files with correct MIME type
        location ~* \.mjs$ {
            types { application/javascript mjs; }
            expires 1h;
            add_header Cache-Control "public, immutable";
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|gif|ico|svg)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }
}
